<!DOCTYPE html>
<html>

<head>
    <title>Semester Results</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="fees-page">

<div class="fees-card">

    <h1>📄 Examination Results</h1>

    <h3>Select Semester</h3>

    <div class="semester-grid">

        <button class="semester-btn" onclick="comingSoon()">
            Semester 1
        </button>

        <button class="semester-btn" onclick="comingSoon()">
            Semester 2
        </button>

        <button class="semester-btn" onclick="comingSoon()">
            Semester 3
        </button>

        <button class="semester-btn" onclick="loadSemester4()">
            Semester 4
        </button>

    </div>

    <br><br>

    <a href="home.html">
        ← Back to Dashboard
    </a>

</div>

<script>

function comingSoon(){

    alert("Results are not available for this semester.");

}

function loadSemester4(){

    document.body.innerHTML=`

    <div class="payment-box">

        <div class="fees-card">

            <h1>Loading Results...</h1>

            <div class="loader"></div>

        </div>

    </div>

    `;

    setTimeout(function(){

        window.location.href="semester4.html";

    },3000);

}

</script>

</body>

</html>

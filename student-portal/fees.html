<!DOCTYPE html>

<html>

<head>
    <title>Examination Fees</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="fees-page">


<div class="fees-card">

    <h1>🎓 Examination Fees</h1>

    <p>Semester Examination Fee Payment</p>

    <h2>₹ 5,082</h2>

    <button onclick="showPaymentOptions()">
        Pay Now
    </button>

    <br><br>

    <a href="home.html">
        ← Back to Dashboard
    </a>

</div>


<script>

function showPaymentOptions(){

    document.body.innerHTML = `

    <div class="payment-box">

        <h1>💳 Pay Through</h1>

        <br>

        <button onclick="cardPayment()">
            Use Card
        </button>

        <br><br>

        <button onclick="generateQR()">
            Generate QR Code
        </button>

    </div>

    `;
}

function cardPayment(){

    alert("Payment Gateway Under Maintenance");

}

function generateQR(){

    document.body.innerHTML = `

    <div class="payment-box">

        <h2>📱 Scan QR Code To Pay</h2>

        <img src="pay.jpeg" class="qr-image">

    </div>

    `;

    setTimeout(function(){

        document.body.innerHTML = `

        <div class="payment-box">

            <h2>Initiating Payment...</h2>

            <div class="loader"></div>

        </div>

        `;

        setTimeout(function(){

            document.body.innerHTML = `

            <div class="payment-box">

                <h1 style="font-size:80px;">✅</h1>

                <h2>Payment Successful</h2>

                <br>

                <a href="home.html">
                    Return To Dashboard
                </a>

            </div>

            `;

        },10000);

    },40000);
}

</script>

</body>

</html>
